<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="secondary-gradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#4f46e5" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Shield/Rounded Box -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#primary-gradient)" filter="url(#shadow)" />
  
  <!-- Subtle inner gradient/highlight line -->
  <rect x="44" y="44" width="424" height="424" rx="96" fill="none" stroke="#a5b4fc" stroke-width="4" opacity="0.6" />

  <!-- The `<` symbol -->
  <path d="M 190 176 L 110 256 L 190 336" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The `>` symbol -->
  <path d="M 322 176 L 402 256 L 322 336" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The `/` symbol in a distinct contrasting color -->
  <path d="M 285 130 L 227 382" fill="none" stroke="url(#secondary-gradient)" stroke-width="52" stroke-linecap="round" filter="url(#glow)" />
</svg>
